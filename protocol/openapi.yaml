openapi: 3.1.0
info:
  title: Session Notify API
  version: 0.1.0
servers:
  - url: https://localhost:8765
security:
  - bearerAuth: []
paths:
  /health:
    get:
      security: []
      responses:
        "200":
          description: Service health.
  /api/v1/devices/bind:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceBindRequest"
      responses:
        "200":
          description: Device credentials.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceBindResponse"
  /api/v1/devices/pair/issue:
    post:
      responses:
        "200":
          description: One-time pairing code signed by an already-bound device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairIssueResponse"
  /api/v1/devices/pair/consume:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairConsumeRequest"
      responses:
        "200":
          description: Newly bound device credentials (same shape as bind).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceBindResponse"
  /api/v1/devices/reset:
    post:
      security: []
      description: Revoke all devices and return to bootstrap state. Localhost-only (127.0.0.1/::1).
      responses:
        "200":
          description: Count of revoked devices.
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked:
                    type: integer
        "403":
          description: Called from a non-localhost host.
  /api/v1/devices:
    get:
      responses:
        "200":
          description: Bound devices.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
  /api/v1/devices/presence:
    get:
      responses:
        "200":
          description: Effective Windows session presence after stale reports are downgraded to unknown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevicePresenceSummary"
  /api/v1/devices/me/presence:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DevicePresenceUpdateRequest"
      responses:
        "200":
          description: Updated effective Windows presence summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DevicePresenceSummary"
        "422":
          description: Only a bound Windows device can report desktop session state.
  /api/v1/devices/{device_id}:
    patch:
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdateRequest"
      responses:
        "200":
          description: Updated device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
    delete:
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Revoked device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
  /api/v1/auth/refresh:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRefreshRequest"
      responses:
        "200":
          description: New access token for an existing device.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessTokenResponse"
  /api/v1/notifications:
    get:
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/NotificationStatus"
      responses:
        "200":
          description: Notifications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationCreate"
      responses:
        "200":
          description: Created notification.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
  /api/v1/notifications/{notification_id}/ack:
    post:
      parameters:
        - name: notification_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AckRequest"
      responses:
        "200":
          description: Ack result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AckResponse"
  /api/v1/events:
    get:
      parameters:
        - name: since_event_id
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Event stream catch-up.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsResponse"
  /api/v1/hooks/{source}:
    post:
      parameters:
        - name: source
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HookPayload"
      responses:
        "200":
          description: Notification generated from hook payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"
  /api/v1/ws:
    get:
      summary: WebSocket endpoint.
      parameters:
        - name: token
          in: query
          required: false
          schema:
            type: string
      responses:
        "101":
          description: WebSocket upgrade. Messages conform to ws-events.schema.json.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    DeviceBindRequest:
      type: object
      required: [name, platform]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        platform:
          type: string
          enum: [windows, android]
        refresh_token:
          type: [string, "null"]
          description: Optional. Under strict mode, proves local identity for a rebind instead of requiring a pairing code.
    DeviceBindResponse:
      type: object
      required: [device, refresh_token, access_token, token_type]
      properties:
        device:
          $ref: "#/components/schemas/Device"
        refresh_token:
          type: string
        access_token:
          type: string
        access_expires_at:
          type: [string, "null"]
          format: date-time
        token_type:
          type: string
          const: bearer
    DeviceUpdateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        notifications_enabled:
          type: boolean
    DevicePresenceUpdateRequest:
      type: object
      required: [session_state]
      properties:
        session_state:
          type: string
          enum: [unknown, locked, unlocked]
    WindowsDevicePresence:
      type: object
      required: [device_id, device_name, reported_session_state, effective_session_state]
      properties:
        device_id:
          type: string
        device_name:
          type: string
        reported_session_state:
          type: string
          enum: [unknown, locked, unlocked]
        effective_session_state:
          type: string
          enum: [unknown, locked, unlocked]
        session_state_updated_at:
          type: [string, "null"]
          format: date-time
    DevicePresenceSummary:
      type: object
      required: [any_unlocked_windows, registered_windows, fresh_windows, evaluated_at, stale_after_seconds, windows_devices]
      properties:
        any_unlocked_windows:
          type: boolean
        registered_windows:
          type: integer
          minimum: 0
        fresh_windows:
          type: integer
          minimum: 0
        evaluated_at:
          type: string
          format: date-time
        stale_after_seconds:
          type: integer
          minimum: 1
        windows_devices:
          type: array
          items:
            $ref: "#/components/schemas/WindowsDevicePresence"
    TokenRefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
    AccessTokenResponse:
      type: object
      required: [device, access_token, token_type]
      properties:
        device:
          $ref: "#/components/schemas/Device"
        access_token:
          type: string
        access_expires_at:
          type: [string, "null"]
          format: date-time
        token_type:
          type: string
          const: bearer
    PairIssueResponse:
      type: object
      required: [code, expires_at]
      properties:
        code:
          type: string
          description: One-time human-readable pairing code, e.g. 7Q4K-9XKM.
        expires_at:
          type: string
          format: date-time
    PairConsumeRequest:
      type: object
      required: [code, name, platform]
      properties:
        code:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 80
        platform:
          type: string
          enum: [windows, android]
    Device:
      type: object
      required: [id, name, platform, created_at, notifications_enabled, session_state]
      properties:
        id:
          type: string
        name:
          type: string
        platform:
          type: string
          enum: [windows, android]
        created_at:
          type: string
          format: date-time
        last_seen_at:
          type: [string, "null"]
          format: date-time
        revoked_at:
          type: [string, "null"]
          format: date-time
        notifications_enabled:
          type: boolean
        session_state:
          type: string
          enum: [unknown, locked, unlocked]
        session_state_updated_at:
          type: [string, "null"]
          format: date-time
    NotificationLevel:
      type: string
      enum: [info, success, important, critical]
    NotificationStatus:
      type: string
      enum: [active, acknowledged, expired, cancelled]
    NotificationCreate:
      type: object
      required: [source, session_id, title, body]
      properties:
        source:
          type: string
        session_id:
          type: string
        title:
          type: string
        body:
          type: string
        level:
          $ref: "#/components/schemas/NotificationLevel"
        expires_at:
          type: [string, "null"]
          format: date-time
        requires_ack:
          type: boolean
        metadata:
          type: object
          description: Arbitrary notification metadata. Hook notifications include `body_generated=true` when the server generated the body from its default fallback because the hook payload contained no displayable text.
          properties:
            body_generated:
              type: boolean
              description: True when the server generated the notification body from its default fallback.
          additionalProperties: true
    Notification:
      allOf:
        - $ref: "#/components/schemas/NotificationCreate"
        - type: object
          required: [id, status, created_at, updated_at]
          properties:
            id:
              type: string
            origin_device_id:
              type: [string, "null"]
              description: Device id that created the notification.
            origin_device_name:
              type: [string, "null"]
              description: Device display name that created the notification.
            origin_device_platform:
              type: [string, "null"]
              enum: [windows, android, null]
              description: Platform of the device that created the notification.
            status:
              $ref: "#/components/schemas/NotificationStatus"
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    AckRequest:
      type: object
      properties:
        reason:
          type: string
          default: user_confirmed
    AckResponse:
      type: object
      required: [notification, already_acknowledged]
      properties:
        notification:
          $ref: "#/components/schemas/Notification"
        already_acknowledged:
          type: boolean
    EventsResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: "./ws-events.schema.json"
    HookPayload:
      type: object
      properties:
        event_type:
          type: [string, "null"]
        message:
          type: [string, "null"]
        prompt:
          type: [string, "null"]
        command:
          type: [string, "null"]
        summary:
          type: [string, "null"]
        session_id:
          type: [string, "null"]
        metadata:
          type: object
